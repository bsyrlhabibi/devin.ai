# Network catalogue used by the EVM wallet agent.
#
# Each network entry exposes RPC endpoints under ``rpc:``:
#   - ``alchemy``      preferred RPC, used when ``ALCHEMY_API_KEY`` is set in
#                       the environment and the caller does not pass
#                       ``use_alchemy=False``.
#   - ``public``       primary public RPC.
#   - ``public_backup``secondary public RPC, tried if ``public`` is blank or
#                       fails to resolve.
#
# Public RPCs honour optional ``${<NETWORK>_RPC_URL}`` env-var overrides so
# production callers can plug in private nodes without code changes.
#
# ``native_currency`` is intentionally a dict (with ``decimals``) because the
# transactions / fee / wallet modules read ``native_currency.decimals`` when
# converting amounts to wei.

networks:
  # ----------------------------------------------------------------------
  # Ethereum + EVM L2s
  # ----------------------------------------------------------------------
  ethereum:
    name: "Ethereum Mainnet"
    chain_id: 1
    explorer: "https://etherscan.io"
    native_currency:
      name: "Ether"
      symbol: "ETH"
      decimals: 18
    rpc:
      alchemy: "https://eth-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY:-}"
      public: "${ETHEREUM_RPC_URL:-https://eth.llamarpc.com}"
      public_backup: "https://rpc.ankr.com/eth"

