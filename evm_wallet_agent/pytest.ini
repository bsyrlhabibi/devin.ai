[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --tb=short
    --color=yes
markers =
    live_e2e: live-testnet integration tests; require EVM_WALLET_RUN_E2E=1 and funded test wallets
filterwarnings =
    ignore::DeprecationWarning:eth_account.*
    ignore::DeprecationWarning:web3.*
