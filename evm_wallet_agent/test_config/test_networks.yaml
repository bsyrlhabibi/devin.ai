networks:
  sepolia:
    name: "Sepolia Testnet"
    chain_id: 11155111
    rpc_url: "${SEPOLIA_RPC_URL:-https://ethereum-sepolia.publicnode.com}"
    explorer: "https://sepolia.etherscan.io"
    native_currency:
      name: "Sepolia Ether"
      symbol: "ETH"
      decimals: 18

  mumbai:
    name: "Polygon Mumbai Testnet"
    chain_id: 80001
    rpc_url: "${MUMBAI_RPC_URL:-https://rpc-mumbai.maticvigil.com}"
    explorer: "https://mumbai.polygonscan.com"
    native_currency:
      name: "Polygon"
      symbol: "MATIC"
      decimals: 18

  bsc_testnet:
    name: "BNB Smart Chain Testnet"
    chain_id: 97
    rpc_url: "${BSC_TESTNET_RPC_URL:-https://data-seed-prebsc-1-s1.binance.org:8545}"
    explorer: "https://testnet.bscscan.com"
    native_currency:
      name: "tBNB"
      symbol: "tBNB"
      decimals: 18

  # Offline test fixture used by the unit tests. The mock RPC URL is never
  # actually contacted because tests patch ``get_web3`` to return a mock.
  test_offline:
    name: "Offline Test Network"
    chain_id: 31337
    rpc_url: "http://127.0.0.1:0/never-contacted"
    explorer: "https://example.invalid"
    native_currency:
      name: "Test Ether"
      symbol: "ETH"
      decimals: 18

  test_offline_legacy:
    name: "Offline Test Network (Legacy)"
    chain_id: 31338
    rpc_url: "http://127.0.0.1:0/never-contacted"
    explorer: "https://example.invalid"
    native_currency:
      name: "Test BNB"
      symbol: "BNB"
      decimals: 18
